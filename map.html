<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wallachtia & Klanansk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1410;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      color: #e8d9b5;
    }

    h1 {
      margin: 20px 0 12px;
      font-size: 1.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c9a84c;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    }

    .map-wrapper {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }

    .map-wrapper img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* ── PIN ── */
    .pin {
      position: absolute;
      transform: translate(-50%, -100%);
      cursor: pointer;
      z-index: 10;
    }

    .pin svg {
      width: 28px;
      height: 36px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
      transition: transform 0.15s ease;
    }

    .pin:hover svg {
      transform: scale(1.2);
    }

    /* ── POPUP ── */
    .popup {
      display: none;
      position: absolute;
      background: #2b1f0e;
      border: 1px solid #c9a84c;
      border-radius: 4px;
      padding: 10px 14px;
      min-width: 160px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7);
      z-index: 20;
      white-space: nowrap;
    }

    .popup.visible {
      display: block;
    }

    .popup h2 {
      font-size: 1rem;
      color: #c9a84c;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .popup a {
      display: inline-block;
      font-size: 0.8rem;
      color: #e8d9b5;
      text-decoration: none;
      border: 1px solid #c9a84c55;
      border-radius: 3px;
      padding: 3px 8px;
      transition: background 0.15s;
    }

    .popup a:hover {
      background: #c9a84c22;
    }

    .popup .close {
      position: absolute;
      top: 5px;
      right: 8px;
      font-size: 0.75rem;
      color: #c9a84c88;
      cursor: pointer;
      line-height: 1;
    }

    .popup .close:hover { color: #c9a84c; }

    footer {
      margin: 14px 0 20px;
      font-size: 0.75rem;
      color: #7a6a4a;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<h1>Wallachtia &amp; Klanansk</h1>

<div class="map-wrapper" id="mapWrapper">

  <!-- MAP IMAGE — replace src with your hosted image URL if needed -->
  <img src="Wallachtia___Klanansk.jpg" alt="Map of Wallachtia and Klanansk" id="mapImg" />

  <!--
  ═══════════════════════════════════════════════════════
  HOW TO ADD A PIN:

  1. Copy one of the .pin + .popup pairs below.
  2. Change the id values (e.g. pin-froenberg, popup-froenberg).
  3. Change the onclick and the popup's data-pin to match.
  4. Adjust the `style="left: X%; top: Y%"` values to move
     the pin to the right spot on the map.
     - left: 0% = far left edge, 100% = far right edge
     - top:  0% = top edge,      100% = bottom edge
     - Tweak in small steps (1–2%) until it sits on the location.
  5. Change the <h2> text to the location name.
  6. Change the href to your Obsidian Publish URL for that location.
  ═══════════════════════════════════════════════════════
  -->

  <!-- ── WALLCARUS ── -->
  <div class="pin" id="pin-wallcarus" style="left: 30.5%; top: 72%;"
       onclick="togglePopup('popup-wallcarus')">
    <svg viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 0C8.477 0 4 4.477 4 10c0 7.5 10 26 10 26S24 17.5 24 10C24 4.477 19.523 0 14 0z"
            fill="#c9a84c" stroke="#2b1f0e" stroke-width="1.5"/>
      <circle cx="14" cy="10" r="4" fill="#2b1f0e"/>
    </svg>
  </div>
  <div class="popup" id="popup-wallcarus" data-pin="pin-wallcarus"
       style="left: 32%; top: 58%;">
    <span class="close" onclick="closePopup('popup-wallcarus')">✕</span>
    <h2>Wallcarus</h2>
    <a href="https://publish.obsidian.md/starsandsteelwiki/3+-+Settlements/Wallcarus/Wallcarus"
       target="_blank">Open in Wiki →</a>
  </div>

</div>

<footer>Wallachtia &amp; Klanansk — Stars &amp; Steel</footer>

<script>
  function togglePopup(popupId) {
    // Close any other open popups first
    document.querySelectorAll('.popup.visible').forEach(p => {
      if (p.id !== popupId) p.classList.remove('visible');
    });
    document.getElementById(popupId).classList.toggle('visible');
  }

  function closePopup(popupId) {
    document.getElementById(popupId).classList.remove('visible');
  }

  // Close popups when clicking elsewhere on the map
  document.getElementById('mapWrapper').addEventListener('click', function(e) {
    if (!e.target.closest('.pin') && !e.target.closest('.popup')) {
      document.querySelectorAll('.popup.visible').forEach(p => p.classList.remove('visible'));
    }
  });
</script>

</body>
</html>
