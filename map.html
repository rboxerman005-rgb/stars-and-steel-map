<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wallachtia & Klanansk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1410;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      color: #e8d9b5;
    }

    h1 {
      margin: 20px 0 12px;
      font-size: 1.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c9a84c;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    }

    .map-wrapper {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }

    .map-wrapper img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* ── PIN ── */
    .pin {
      position: absolute;
      transform: translate(-50%, -100%);
      cursor: pointer;
      z-index: 10;
      text-decoration: none;
    }

    .pin svg {
      width: 28px;
      height: 36px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
      transition: transform 0.15s ease;
    }

    .pin:hover svg {
      transform: scale(1.2);
    }

    /* ── TOOLTIP ── */
    .tooltip {
      display: none;
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #2b1f0e;
      border: 1px solid #c9a84c;
      border-radius: 4px;
      padding: 8px 12px;
      min-width: 180px;
      max-width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7);
      z-index: 20;
      white-space: normal;
      pointer-events: none;
    }

    .pin:hover .tooltip {
      display: block;
    }

    .tooltip h2 {
      font-size: 0.95rem;
      color: #c9a84c;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    .tooltip p {
      font-size: 0.78rem;
      color: #e8d9b5;
      line-height: 1.4;
    }

    footer {
      margin: 14px 0 20px;
      font-size: 0.75rem;
      color: #7a6a4a;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<h1>Wallachtia &amp; Klanansk</h1>

<div class="map-wrapper" id="mapWrapper">

  <img src="Wallachtia__Klanansk.jpg" alt="Map of Wallachtia and Klanansk" />

  <!--
  ═══════════════════════════════════════════════════════
  HOW TO ADD A PIN:

  1. Copy the entire <a class="pin">...</a> block below.
  2. Change the id (e.g. pin-froenberg).
  3. Adjust left/top percentages to position it on the map.
     - left: 0% = far left, 100% = far right
     - top:  0% = top,      100% = bottom
  4. Change the href to the Obsidian Publish URL.
  5. Update the <h2> name and <p> description inside the tooltip.
  ═══════════════════════════════════════════════════════
  -->

  <!-- ── WALLCARUS ── -->
  <a class="pin" id="pin-wallcarus"
     style="left: 30.5%; top: 72%;"
     href="https://publish.obsidian.md/starsandsteelwiki/3+-+Settlements/Wallcarus/Wallcarus"
     target="_blank">
    <svg viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 0C8.477 0 4 4.477 4 10c0 7.5 10 26 10 26S24 17.5 24 10C24 4.477 19.523 0 14 0z"
            fill="#c9a84c" stroke="#2b1f0e" stroke-width="1.5"/>
      <circle cx="14" cy="10" r="4" fill="#2b1f0e"/>
    </svg>
    <div class="tooltip">
      <h2>Wallcarus</h2>
      <p>The capital of the Wallachtian Empire and its largest city.</p>
    </div>
  </a>

</div>

<footer>Wallachtia &amp; Klanansk — Stars &amp; Steel</footer>

</body>
</html>
